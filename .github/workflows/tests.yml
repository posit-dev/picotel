name: Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
    - name: Run tests
      run: |
        pytest -v tests --cov=picotel --cov-report=term-missing --cov-fail-under=95

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ">=3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Bootstrap otelcol
        run: ./tests-e2e/bootstrap.sh

      - name: Run E2E tests
        run: pytest tests-e2e/ -v
