name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ">=3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Bootstrap otelcol
        run: ./tests-e2e/bootstrap.sh

      - name: Run E2E tests
        run: pytest tests-e2e/ -v
